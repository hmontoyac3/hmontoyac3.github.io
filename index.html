<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helena Montoya Calero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 560px; width: 100%; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem; }
    .subtitle { font-size: 0.95rem; color: #666; margin-bottom: 2.5rem; }
    a.card {
      display: block;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a.card:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card-sub { font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Helena Montoya Calero</h1>
    <p class="subtitle">PhD Candidate &middot; Bocconi University &middot; ION Management Science Lab</p>
    <a class="card" href="/research/">
      <div class="card-title">Research</div>
      <div class="card-sub">Active projects &amp; working papers</div>
    </a>
  </div>
</body>
</html>
